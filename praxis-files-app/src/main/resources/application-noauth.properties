# Profile para desenvolvimento sem autenticação
spring.application.name=file-management-development-noauth
server.port=8086

# Desabilitar segurança para testes
# Evita o bootstrap do usuário/senha padrão do Spring Security no profile sem autenticação
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
file.management.security.require-authentication-by-default=false
file.management.security.permit-file-endpoints=true
file.management.security.permit-health-endpoints=true
file.management.security.permit-actuator-endpoints=true

# Allow uploads up to the library default (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Keep the presign showcase functional behind the local same-origin frontend proxy.
file.management.presign.upload-url-template=/api/files/upload

# OpenAPI and Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Actuator exposure
management.endpoints.web.exposure.include=health,info,mappings,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging
logging.level.br.com.praxis.filemanagement=DEBUG
logging.level.org.springframework.security=DEBUG
