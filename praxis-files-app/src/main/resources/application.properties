# Minimal development configuration for the file management example app
spring.application.name=file-management-development
server.port=8086

# Allow uploads up to the library default (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAPI and Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Actuator exposure
management.endpoints.web.exposure.include=health,info,mappings,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Logging
logging.level.br.com.praxis.filemanagement=DEBUG
logging.level.org.springframework.security=INFO
