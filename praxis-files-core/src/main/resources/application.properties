# File Management Configuration
file.management.upload-dir=./uploads

# Security Configuration
file.management.security.block-html-files=true
file.management.security.script-detection-buffer-size=4096
file.management.security.magic-number-validation=true

# Rate Limiting Configuration
file.management.rate-limit.enabled=true
file.management.rate-limit.max-uploads-per-minute=10
file.management.rate-limit.max-uploads-per-hour=100
file.management.rate-limit.max-concurrent-uploads=3

# Virus Scanning Configuration
file.management.virus-scanning.enabled=false
file.management.virus-scanning.clamav-host=localhost
file.management.virus-scanning.clamav-port=3310
file.management.virus-scanning.connection-timeout=5000
file.management.virus-scanning.read-timeout=30000
file.management.virus-scanning.max-file-size-bytes=10485760
file.management.virus-scanning.fail-on-scanner-unavailable=false

# Audit Logging Configuration
file.management.audit-logging.enabled=true
file.management.audit-logging.log-successful-uploads=true
file.management.audit-logging.log-all-security-events=true
file.management.audit-logging.minimum-severity=LOW
file.management.audit-logging.include-sensitive-data=true
file.management.audit-logging.use-structured-logging=true
file.management.audit-logging.max-error-message-length=1000
file.management.audit-logging.cleanup-interval-minutes=60
file.management.audit-logging.statistics-retention-hours=24

# Logging Configuration for Security Audit
logging.level.SECURITY_AUDIT=INFO
logging.level.br.com.praxis.filemanagement.core.audit.SecurityAuditLogger=DEBUG
logging.level.br.com.praxis.filemanagement.core.services=DEBUG

# Spring Boot Actuator Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.health.fileManagement.enabled=true
management.health.securityMetrics.enabled=true
management.health.virusScanning.enabled=true

# Health Check Groups
management.endpoint.health.group.security.include=fileManagement,securityMetrics,virusScanning
management.endpoint.health.group.security.show-details=always